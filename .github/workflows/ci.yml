name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM/Clang (for bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Set LIBCLANG_PATH (Windows)
        run: |
          $paths = @(
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin",
            "C:\Program Files\LLVM\bin"
          )
          foreach ($p in $paths) {
            if (Test-Path "$p\libclang.dll") {
              echo "LIBCLANG_PATH=$p" >> $env:GITHUB_ENV
              exit 0
            }
          }
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Path
          if ($clang) {
            $dir = (Split-Path $clang)
            echo "LIBCLANG_PATH=$dir" >> $env:GITHUB_ENV
          }

      - name: Set up Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Run release binary
        run: .\target\release\llama_rs.exe
